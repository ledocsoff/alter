name: Build and Release Alter

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Build Vite App
        run: npm run build
        
      - name: Transpile Server to CommonJS
        run: npx esbuild server.js --bundle --platform=node --format=cjs --outfile=dist/server.cjs

      # macOS: sign with ad-hoc identity (no Apple Developer account needed)
      # This allows Squirrel.Mac to validate the update without a paid certificate
      - name: Publish Electron App (macOS - Ad-hoc signed)
        if: matrix.os == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CODESIGN_IDENTITY: '-'
        run: npx electron-builder --config electron-builder.json --publish always --mac

      - name: Publish Electron App (Windows)
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --config electron-builder.json --publish always --win
